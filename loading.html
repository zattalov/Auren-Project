<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUREN Starting...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0d0f12;
            /* Dark theme to match UI */
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        .loader-container {
            text-align: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #3b82f6;
            /* Blue */
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        p {
            font-size: 1.2rem;
            color: #9ca3af;
            margin: 0;
        }
    </style>
</head>

<body>
    <div class="loader-container">
        <div class="spinner"></div>
        <p>Starting AUREN Services...</p>
        <p style="font-size: 0.9rem; margin-top: 10px; opacity: 0.5;">This will just take a few seconds.</p>
    </div>
</body>

</html>
